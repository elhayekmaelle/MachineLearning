services:
  backend:
    build: ./backend
    container_name: cybersecurity-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/models:/app/models
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: cybersecurity-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
